<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Misket Arcade</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%232e7d32'/><circle cx='35' cy='35' r='14' fill='white' opacity='.85'/></svg>">
<style>
/* ============== MISKET ARCADE — three childhood marble games, one engine ============== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#4a3320;
  font-family:'Segoe Print','Bradley Hand','Chalkboard SE','Comic Sans MS',cursive;
  user-select:none;-webkit-user-select:none;color:#4a2f14}
#stage{position:fixed;inset:0}
#cv{position:absolute;inset:0;width:100%;height:100%;touch-action:none;display:block}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;display:none;justify-content:space-between;
  align-items:flex-start;padding:10px 14px;pointer-events:none;color:#fff8ec;
  text-shadow:0 2px 3px rgba(40,20,5,.55)}
#hud.on{display:flex}
#shots{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;max-width:170px}
#shots .sh{width:15px;height:15px;border-radius:50%;background:radial-gradient(circle at 32% 30%,#fff,#4dd0e1 40%,#00838f);
  box-shadow:0 2px 3px rgba(30,10,0,.4)}
#shots .sh.used{background:rgba(255,255,255,.15);box-shadow:inset 0 1px 3px rgba(0,0,0,.4)}
#scoreBox{text-align:center}
#score{font-size:42px;line-height:1;font-weight:bold;color:#ffd166}
#modeLbl{font-size:13px;opacity:.9;letter-spacing:1px}
#right{text-align:right;pointer-events:auto}
#best{font-size:14px;opacity:.9}
.iconbtn{margin-top:6px;margin-left:6px;width:40px;height:40px;font-size:17px;border-radius:50%;
  border:2px solid rgba(255,240,210,.4);background:rgba(52,30,12,.6);color:#fff8ec;cursor:pointer}
#callout{position:absolute;left:50%;top:26%;transform:translate(-50%,-50%);pointer-events:none;
  font-size:clamp(26px,6vw,44px);color:#fff;text-shadow:0 3px 8px rgba(30,10,0,.7),0 0 22px rgba(255,190,80,.5);
  opacity:0;white-space:nowrap;z-index:3;text-align:center}
#callout.pop{animation:pop 1.3s ease-out forwards}
@keyframes pop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}
 12%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}22%{transform:translate(-50%,-50%) scale(1)}
 72%{opacity:1}100%{opacity:0;transform:translate(-50%,-64%) scale(1)}}

/* OVERLAYS */
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:14px;
  background:rgba(38,20,6,.62);backdrop-filter:blur(3px);z-index:5;overflow-y:auto}
.overlay.hidden{display:none}
.card{background:linear-gradient(160deg,#fdf3e0,#f3e0be);border-radius:22px;padding:22px 22px;
  max-width:min(560px,94vw);width:100%;text-align:center;
  box-shadow:0 18px 50px rgba(20,8,0,.55),inset 0 0 0 3px rgba(160,110,50,.25)}
.title{font-size:clamp(38px,9vw,58px);line-height:.95;color:#7a4514;letter-spacing:1px}
.title .a{color:#2e7d32}
.tag{font-size:14.5px;opacity:.85;margin:6px 0 16px}
#modeGrid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:460px){#modeGrid{grid-template-columns:1fr 1fr 1fr}}
.mode{background:#fff7e8;border:2px solid #b98a5d;border-radius:16px;padding:14px 12px;cursor:pointer;
  text-align:center;transition:transform .12s,box-shadow .12s,border-color .12s;position:relative}
.mode:hover,.mode:active{transform:translateY(-3px);border-color:#2e7d32;box-shadow:0 8px 18px rgba(20,8,0,.25)}
.mode canvas{width:66px;height:66px;margin:0 auto 6px;display:block}
.mode .mn{font-size:21px;color:#7a4514;line-height:1}
.mode .md{font-size:12px;opacity:.8;margin-top:5px;line-height:1.3;min-height:46px}
.mode .mb{font-size:12px;margin-top:7px;color:#2e7d32;font-weight:bold}
.foot{font-size:12px;margin-top:14px;opacity:.7}
.big{margin-top:16px;width:100%;padding:13px;font-family:inherit;font-size:21px;border-radius:14px;
  border:none;cursor:pointer;background:linear-gradient(180deg,#2f9e44,#237032);color:#fff;
  box-shadow:0 5px 0 #1b5426,0 8px 18px rgba(20,8,0,.35)}
.big:active{transform:translateY(3px);box-shadow:0 2px 0 #1b5426}
.big.alt{background:linear-gradient(180deg,#b98a5d,#8f6237);box-shadow:0 5px 0 #6e4a27}
.big.alt:active{box-shadow:0 2px 0 #6e4a27}
.finalScore{font-size:56px;color:#e65100;line-height:1;margin:4px 0 2px;font-weight:bold}
.bestLine{font-size:14px;opacity:.8}
.bestLine.nb{color:#c62828;font-weight:bold;opacity:1}
.showcase{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;align-items:center;
  background:#fff7e8;border:2px solid #b98a5d;border-radius:10px;padding:6px;margin-top:10px;
  max-height:100px;overflow-y:auto;min-height:34px}
h2.over{font-size:30px;color:#7a4514}
.howto{font-size:13px;opacity:.85;margin-top:8px;line-height:1.4;text-align:left;
  background:#fff7e8;border:2px solid #b98a5d;border-radius:12px;padding:10px 12px}
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div><div style="font-size:12px;letter-spacing:1px">SHOTS</div><div id="shots"></div></div>
    <div id="scoreBox"><div id="score">0</div><div id="modeLbl">ÇEMBER</div></div>
    <div id="right"><div id="best">Best: 0</div><button class="iconbtn" id="btnMute">🔊</button><button class="iconbtn" id="btnHome">⌂</button></div>
  </div>
  <div id="callout"></div>

  <!-- HUB / HOME -->
  <div class="overlay" id="hub">
    <div class="card">
      <div class="title">Misket <span class="a">Arcade</span></div>
      <div class="tag">Three street-marble games from the schoolyard — one thumb, beat your best</div>
      <div id="modeGrid"></div>
      <div class="foot" id="hubFoot"></div>
    </div>
  </div>

  <!-- GAME OVER -->
  <div class="overlay hidden" id="overOv">
    <div class="card">
      <h2 class="over" id="overTitle">Run over!</h2>
      <div class="finalScore" id="finalScore">0</div>
      <div class="bestLine" id="bestLine">Best: 0</div>
      <div class="showcase" id="collected"></div>
      <button class="big" id="btnAgain">Play again ▸</button>
      <button class="big alt" id="btnBack">◂ Pick a game</button>
    </div>
  </div>
</div>

<script>
'use strict';
/* =========================================================================
   MISKET ARCADE — shared flick+physics engine, three childhood modes:
     çember (knock out of circle) · çukur (sink into the pot) · avcı (hit to catch)
   ========================================================================= */

/* ============================== CONFIG ============================== */
const W = 820, H = 900;
const CENTER = { x: 410, y: 388 };
const CIRCLE = { x: CENTER.x, y: CENTER.y, r: 232 };
const HOLE = { x: CENTER.x, y: CENTER.y, r: 46 };
const SPAWN = { x: 410, y: 792 };
const MARBLE_R = 20, SHOOTER_R = 24;
const MIN_SPEED = 300, MAX_SPEED = 1800, MAX_DRAG = 220;
const FRICTION_LIN = 1.85, FRICTION_QUAD = 0.0005;
const RESTITUTION = 0.94, WALL_E = 0.5, SLEEP_V = 14, WALL_M = 14;
const STEP = 1 / 120, START_SHOTS = 8;
const PALETTE = ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22','#1abc9c','#fd79a8'];

const MODES = {
  cember: { name: 'Çember', en: 'Circle',
    blurb: 'Knock marbles fully out of the chalk circle.',
    how: 'The classic. Flick your enek and shove marbles across the chalk line — anything fully outside is captured. Rare marbles score more, multi-captures multiply, Legendary+ grants a bonus flick.' },
  cukur:  { name: 'Çukur', en: 'Pot',
    blurb: 'Sink marbles into the pot in the middle.',
    how: 'The pot game. Nudge marbles into the hole at the center to pocket them — landing your enek in the pot too gives a bonus flick. Soft, precise taps beat big swings.' },
  avci:   { name: 'Avcı', en: 'Hunter',
    blurb: 'Hit target marbles head-on to catch them.',
    how: 'Tak! No circle — just hunt. Your enek captures any marble it strikes, and it keeps rolling, so line them up and chain hits down the field for combos.' },
};

/* ============================== UTILS ============================== */
const rand = (a = 1, b) => b === undefined ? Math.random() * a : a + Math.random() * (b - a);
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
function hexRGB(h) { return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)]; }
function mix(h, t, w, al = 1) { const c = hexRGB(h), o = t === 'w' ? 255 : 0;
  return `rgba(${c.map(x => Math.round(x + (o - x) * w)).join(',')},${al})`; }
const distC = m => Math.hypot(m.x - CENTER.x, m.y - CENTER.y);
const $ = id => document.getElementById(id);

/* ============================== AUDIO ============================== */
let actx = null, master = null, noiseBuf = null, lastClickT = 0;
function audio() {
  if (!actx) {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    master = actx.createGain(); master.gain.value = 0.5; master.connect(actx.destination);
    noiseBuf = actx.createBuffer(1, actx.sampleRate * 0.15, actx.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function tone(freq, dur, vol, type = 'triangle', when = 0, slide = 0) {
  const c = audio(), t = c.currentTime + when;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if (slide) o.frequency.exponentialRampToValueAtTime(slide, t + dur);
  g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(master); o.start(t); o.stop(t + dur + 0.02);
}
const sfx = {
  click(imp) {
    if (game.muted) return;
    const c = audio();
    if (c.currentTime - lastClickT < 0.025) return;
    lastClickT = c.currentTime;
    const k = clamp(imp / 1400, 0.08, 1);
    tone(900 + k * 2300, 0.05, 0.10 + k * 0.5, 'triangle');
    const src = c.createBufferSource(); src.buffer = noiseBuf;
    const bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2600 + k * 2000; bp.Q.value = 1.2;
    const g = c.createGain(); g.gain.setValueAtTime(k * 0.45, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + 0.04);
    src.connect(bp); bp.connect(g); g.connect(master); src.start(); src.stop(c.currentTime + 0.05);
  },
  flick()  { if (!game.muted) tone(180, 0.09, 0.18, 'sine', 0, 90); },
  pop()    { if (!game.muted) tone(340, 0.13, 0.4, 'sine', 0, 980); },
  sink()   { if (!game.muted) tone(520, 0.16, 0.4, 'sine', 0, 150); },
  rare()   { if (!game.muted) [880, 1175, 1760].forEach((f, i) => tone(f, 0.16, 0.32, 'triangle', i * 0.09)); },
  combo(n) { if (!game.muted) for (let i = 0; i < Math.min(n, 5); i++) tone(520 + i * 160, 0.1, 0.3, 'triangle', i * 0.07); },
  over()   { if (!game.muted) [659, 784, 988, 1319].forEach((f, i) => tone(f, 0.22, 0.3, 'triangle', i * 0.13)); },
};

/* ============================== MARBLE MODELS ============================== */
const RARITY = [
  { name: 'Common',    col: '#cfc8b8', val: 1 },
  { name: 'Rare',      col: '#4fc3f7', val: 2 },
  { name: 'Epic',      col: '#b388ff', val: 3 },
  { name: 'Legendary', col: '#ffd54f', val: 5 },
  { name: 'Mythic',    col: '#ff5ca8', val: 8 },
];
const TYPES = [
  { id: 'kedigozu', name: 'Kedigözü', rarity: 0, w: 38  },
  { id: 'sutlu',    name: 'Sütlü',    rarity: 0, w: 26  },
  { id: 'boncuk',   name: 'Boncuk',   rarity: 0, w: 10, r: 17 },
  { id: 'seffaf',   name: 'Şeffaf',   rarity: 0, w: 8   },
  { id: 'gazoz',    name: 'Gazoz',    rarity: 1, w: 14  },
  { id: 'ebruli',   name: 'Ebruli',   rarity: 1, w: 11  },
  { id: 'cincik',   name: 'Cıncık',   rarity: 1, w: 8, r: 15 },
  { id: 'ates',     name: 'Ateş',     rarity: 1, w: 7   },
  { id: 'zebra',    name: 'Zebra',    rarity: 1, w: 7   },
  { id: 'camgoz',   name: 'Camgöz',   rarity: 2, w: 6   },
  { id: 'petrol',   name: 'Petrol',   rarity: 2, w: 3.5 },
  { id: 'dobi',     name: 'Dobi',     rarity: 2, w: 4, r: 29, val: 4 },
  { id: 'yakut',    name: 'Yakut',    rarity: 2, w: 3   },
  { id: 'inci',     name: 'İnci',     rarity: 2, w: 3   },
  { id: 'kemik',    name: 'Kemik',    rarity: 3, w: 2   },
  { id: 'demirli',  name: 'Demirli',  rarity: 3, w: 1.5, r: 16, dens: 3.2, val: 5 },
  { id: 'galaksi',  name: 'Galaksi',  rarity: 3, w: 1.2 },
  { id: 'altin',    name: 'Altın',    rarity: 4, w: 0.9, val: 8 },
];
const TYPE_COLOR = {
  gazoz: '#7fd4e5', ebruli: '#b8bfc7', petrol: '#39414f', kemik: '#e9dfc6', demirli: '#8f98a3',
  seffaf: '#dfe8e5', ates: '#f4511e', zebra: '#b9b6ac', yakut: '#c62828', inci: '#f3e3da',
  galaksi: '#283593', altin: '#f9a825',
};
function pickType() {
  let r = Math.random() * TYPES.reduce((s, t) => s + t.w, 0);
  for (const t of TYPES) { r -= t.w; if (r <= 0) return t; }
  return TYPES[0];
}
function makeSprite(r, kind, color) {
  const S = Math.ceil(r * 5), R = S / 2;
  const c = document.createElement('canvas'); c.width = c.height = S;
  const x = c.getContext('2d');
  x.translate(R, R);
  x.beginPath(); x.arc(0, 0, R - 1, 0, 7); x.clip();
  const base = (c0, c1, c2, c3) => {
    const g = x.createRadialGradient(-R * .32, -R * .36, R * .08, 0, 0, R);
    g.addColorStop(0, c0); g.addColorStop(.28, c1); g.addColorStop(.72, c2); g.addColorStop(1, c3);
    x.fillStyle = g; x.fillRect(-R, -R, S, S);
  };
  const blade = (rot, fill, sc = 1) => {
    x.save(); x.rotate(rot); x.scale(sc, 1);
    x.beginPath(); x.moveTo(0, 0);
    x.bezierCurveTo(R * .52, -R * .16, R * .78, R * .30, R * .16, R * .52);
    x.bezierCurveTo(R * .42, R * .10, R * .26, -R * .05, 0, 0);
    x.closePath(); x.fillStyle = fill; x.fill(); x.restore();
  };
  const bubbles = (n, a = .3) => {
    for (let i = 0; i < n; i++) {
      x.beginPath(); x.arc(rand(-R * .55, R * .55), rand(-R * .55, R * .55), rand(1, R * .07), 0, 7);
      x.fillStyle = `rgba(255,255,255,${a})`; x.fill();
    }
  };
  const rim = (al = .42) => {
    const g = x.createRadialGradient(0, 0, R * .55, 0, 0, R);
    g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, `rgba(15,5,0,${al})`);
    x.fillStyle = g; x.fillRect(-R, -R, S, S);
  };
  if (kind === 'enek' || kind === 'kedigozu') {
    base('rgba(255,255,255,.95)', mix(color, 'w', .55), color, mix(color, 'b', .45));
    const nb = kind === 'enek' ? 4 : 3;
    for (let i = 0; i < nb; i++)
      blade(i * Math.PI * 2 / nb + .45, i % 2 ? 'rgba(255,255,255,.5)' : mix(color, 'b', .28, .6));
    bubbles(4); rim();
  } else if (kind === 'sutlu') {
    base('#ffffff', mix(color, 'w', .78), mix(color, 'w', .55), mix(color, 'w', .25));
    for (let i = 0; i < 2; i++) blade(i * Math.PI + .9, 'rgba(255,255,255,.45)', 1.15);
    rim(.2);
  } else if (kind === 'seffaf') {
    base('rgba(255,255,255,.98)', '#f2f7f6', '#dbe7e4', '#9fb4ad');
    bubbles(5, .35); rim(.25);
  } else if (kind === 'ates') {
    base('rgba(255,255,255,.9)', '#ffb74d', '#f4511e', '#8e2409');
    for (let i = 0; i < 4; i++)
      blade(i * Math.PI / 2 + .6, i % 2 ? 'rgba(255,235,59,.55)' : 'rgba(183,28,28,.5)', 1.05);
    bubbles(2, .2); rim(.4);
  } else if (kind === 'zebra') {
    base('#ffffff', '#f5f5f2', '#e4e2da', '#a9a79e');
    x.strokeStyle = 'rgba(30,28,25,.75)'; x.lineCap = 'round';
    for (let i = -2; i <= 2; i++) {
      x.lineWidth = R * .15;
      x.beginPath(); x.moveTo(-R, i * R * .34 - R * .1);
      x.quadraticCurveTo(0, i * R * .34 + R * .2, R, i * R * .34 - R * .1);
      x.stroke();
    }
    rim(.35);
  } else if (kind === 'yakut') {
    base('rgba(255,255,255,.92)', '#ff6b6b', '#c62828', '#5e0f0f');
    let g = x.createRadialGradient(0, 0, 0, 0, 0, R * .5);
    g.addColorStop(0, 'rgba(255,205,210,.6)'); g.addColorStop(1, 'rgba(255,205,210,0)');
    x.fillStyle = g; x.beginPath(); x.arc(0, 0, R * .5, 0, 7); x.fill();
    x.strokeStyle = 'rgba(255,255,255,.5)'; x.lineWidth = R * .04;
    x.beginPath(); x.moveTo(-R * .4, -R * .1); x.lineTo(-R * .05, -R * .45); x.stroke();
    rim(.45);
  } else if (kind === 'inci') {
    base('#ffffff', '#fdf6f0', '#f3e9e2', '#c9b8ae');
    for (const [col, rot] of [['rgba(255,182,193,.2)', .7], ['rgba(173,216,230,.2)', 2.8], ['rgba(152,251,152,.16)', 4.7]]) {
      x.save(); x.rotate(rot);
      x.beginPath(); x.ellipse(R * .15, 0, R * .6, R * .34, 0, 0, 7);
      x.fillStyle = col; x.fill(); x.restore();
    }
    rim(.2);
  } else if (kind === 'galaksi') {
    base('#7986cb', '#3949ab', '#1a1f4b', '#05071c');
    blade(.8, 'rgba(236,64,122,.28)', 1.1);
    blade(3.6, 'rgba(0,229,255,.22)', 1.1);
    for (let i = 0; i < 18; i++) {
      x.beginPath(); x.arc(rand(-R * .75, R * .75), rand(-R * .75, R * .75), rand(.6, R * .035), 0, 7);
      x.fillStyle = `rgba(255,255,255,${rand(.4, .95)})`; x.fill();
    }
    rim(.5);
  } else if (kind === 'altin') {
    base('rgba(255,255,255,.95)', '#ffe082', '#f9a825', '#7a4a00');
    for (let i = 0; i < 22; i++) {
      x.save(); x.translate(rand(-R * .7, R * .7), rand(-R * .7, R * .7)); x.rotate(rand(6.28));
      const s = rand(R * .03, R * .08);
      x.fillStyle = `rgba(255,${(rand(210, 245)) | 0},130,${rand(.5, 1)})`;
      x.fillRect(-s / 2, -s / 2, s, s); x.restore();
    }
    rim(.4);
  } else if (kind === 'boncuk') {
    base('rgba(255,255,255,.9)', mix(color, 'w', .3), color, mix(color, 'b', .4));
    x.fillStyle = 'rgba(30,15,5,.75)';
    x.beginPath(); x.arc(0, 0, R * .14, 0, 7); x.fill();
    x.strokeStyle = 'rgba(255,255,255,.35)'; x.lineWidth = R * .05;
    x.beginPath(); x.arc(0, 0, R * .2, 0, 7); x.stroke();
    rim(.35);
  } else if (kind === 'cincik') {
    base('rgba(255,255,255,.97)', mix(color, 'w', .6), mix(color, 'w', .2), mix(color, 'b', .35));
    x.strokeStyle = 'rgba(255,255,255,.85)'; x.lineWidth = R * .05;
    for (const [gx, gy, l] of [[-R * .25, -R * .2, R * .18], [R * .3, R * .25, R * .12]]) {
      x.beginPath(); x.moveTo(gx - l, gy); x.lineTo(gx + l, gy);
      x.moveTo(gx, gy - l); x.lineTo(gx, gy + l); x.stroke();
    }
    bubbles(3, .4); rim(.3);
  } else if (kind === 'demirli') {
    base('#ffffff', '#d9dde2', '#9aa3ad', '#4a525c');
    x.strokeStyle = 'rgba(255,255,255,.25)'; x.lineWidth = R * .08;
    x.beginPath(); x.arc(0, 0, R * .55, .6, 2.4); x.stroke();
    x.strokeStyle = 'rgba(20,25,30,.3)';
    x.beginPath(); x.arc(0, 0, R * .72, 3.6, 5.2); x.stroke();
    rim(.5);
  } else if (kind === 'dobi') {
    base('rgba(255,255,255,.95)', mix(color, 'w', .45), color, mix(color, 'b', .5));
    for (let i = 0; i < 4; i++)
      blade(i * Math.PI / 2 + .3, i % 2 ? 'rgba(255,255,255,.55)' : mix(color, 'b', .3, .7), 1.2);
    bubbles(5); rim(.45);
  } else if (kind === 'gazoz') {

/* ============================== PHYSICS ============================== */
function onImpact(imp) {
  if (imp > 90) sfx.click(imp);
  if (imp > 650) game.shake = Math.min(9, game.shake + (imp - 650) / 320);
}
function collide(a, b, fx) {
  // in avcı the enek passes THROUGH targets (capture handled separately)
  if (game.mode === 'avci' && (a.type === 'shooter' || b.type === 'shooter')) return;
  const dx = b.x - a.x, dy = b.y - a.y, min = a.r + b.r;
  if (Math.abs(dx) > min || Math.abs(dy) > min) return;
  const d = Math.hypot(dx, dy);
  if (d === 0 || d >= min) return;
  const nx = dx / d, ny = dy / d, overlap = min - d;
  const ta = b.m / (a.m + b.m), tb = a.m / (a.m + b.m);
  a.x -= nx * overlap * ta; a.y -= ny * overlap * ta;
  b.x += nx * overlap * tb; b.y += ny * overlap * tb;
  const vn = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
  if (vn >= 0) return;
  const j = -(1 + RESTITUTION) * vn / (1 / a.m + 1 / b.m);
  a.vx -= j * nx / a.m; a.vy -= j * ny / a.m;
  b.vx += j * nx / b.m; b.vy += j * ny / b.m;
  if (fx) onImpact(-vn);
}
function stepWorld(ms, dt, fx, sub = 3) {
  const h = dt / sub;
  for (let s = 0; s < sub; s++) {
    for (const m of ms) {
      const sp = Math.hypot(m.vx, m.vy);
      if (sp > 0) {
        const f = Math.max(0, 1 - (FRICTION_LIN + FRICTION_QUAD * sp) * h);
        m.vx *= f; m.vy *= f;
        if (Math.hypot(m.vx, m.vy) < SLEEP_V) { m.vx = 0; m.vy = 0; }
        else if (fx) m.rot += Math.hypot(m.vx, m.vy) * h / m.r * 0.55;
      }
      m.x += m.vx * h; m.y += m.vy * h;
      if (m.x - m.r < WALL_M) { m.x = WALL_M + m.r; m.vx = Math.abs(m.vx) * WALL_E; }
      if (m.x + m.r > W - WALL_M) { m.x = W - WALL_M - m.r; m.vx = -Math.abs(m.vx) * WALL_E; }
      if (m.y - m.r < WALL_M) { m.y = WALL_M + m.r; m.vy = Math.abs(m.vy) * WALL_E; }
      if (m.y + m.r > H - WALL_M) { m.y = H - WALL_M - m.r; m.vy = -Math.abs(m.vy) * WALL_E; }
    }
    // in avcı capture happens on contact, mid-motion, so check inside the substep
    if (fx && game.mode === 'avci') avciContact();
    for (let i = 0; i < ms.length; i++)
      for (let j = i + 1; j < ms.length; j++) collide(ms[i], ms[j], fx);
  }
}
const allStopped = ms => ms.every(m => m.vx === 0 && m.vy === 0);

/* ============================== GAME STATE ============================== */
const game = {
  screen: 'hub', phase: 'idle', mode: 'cember',
  marbles: [], shooter: null, fx: [], floats: [], parts: [], sinks: [],
  shots: 0, score: 0, collected: [], captThisShot: 0,
  settleTimer: 0, shake: 0, time: 0,

try {

  if (s.best) Object.assign(game.best, s.best);
} catch (e) {}
function save() {

}
function burst(x, y, cols, n, big) {
  for (let i = 0; i < n; i++) {
    const a = rand(6.283), sp = rand(120, big ? 520 : 320);
    game.parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      w: rand(4, big ? 9 : 6), h: rand(2.5, 5), rot: rand(6.28), vr: rand(-9, 9),
      col: cols[(Math.random() * cols.length) | 0], t: 0, life: rand(.6, big ? 1.4 : 1) });
  }
}
// place n target marbles for the current mode
function placeTargets(n) {
  let guard = 0, placed = 0;
  while (placed < n && guard++ < 5000) {
    const t = pickType(), r = t.r || MARBLE_R;
    let x, y;
    if (game.mode === 'avci') {                     // scattered across the field, clear of the enek
      x = rand(60, W - 60); y = rand(70, H - 240);
    } else {                                         // inside the circle
      const a = rand(6.283), d = Math.sqrt(Math.random()) * (CIRCLE.r - 46 - r);
      x = CIRCLE.x + Math.cos(a) * d; y = CIRCLE.y + Math.sin(a) * d;
      if (game.mode === 'cukur' && Math.hypot(x - HOLE.x, y - HOLE.y) < HOLE.r + r + 6) continue; // not in the pot
    }
    if (game.marbles.every(m => Math.hypot(m.x - x, m.y - y) > m.r + r + 10)) {
      game.marbles.push(makeMarble(x, y, r, 'target', t)); placed++;
    }
  }

}
function startRun(mode) {
  game.mode = mode;
  game.marbles.length = 0; game.fx.length = 0; game.floats.length = 0;
  game.parts.length = 0; game.sinks.length = 0;
  makeBackground(mode);
  placeTargets(mode === 'avci' ? 10 : 12);
  game.shooter = makeMarble(SPAWN.x, SPAWN.y, SHOOTER_R, 'shooter');
  game.marbles.push(game.shooter);
  game.shots = START_SHOTS; game.score = 0; game.collected = [];
  game.screen = 'play'; game.phase = 'aim'; game.settleTimer = 0;
  $('hub').classList.add('hidden'); $('overOv').classList.add('hidden');
  $('hud').classList.add('on');
  $('modeLbl').textContent = MODES[mode].name.toUpperCase();
  updateHUD(); showCallout(MODES[mode].name + ' — flick it!');
}
function fireShot(vx, vy) {
  game.shooter.vx = vx; game.shooter.vy = vy;
  game.shots--; game.phase = 'moving'; game.settleTimer = 0; game.captThisShot = 0;
  sfx.flick(); updateHUD();
}
// capture one marble: score, effects, collection
function capture(m, sunk) {
  m.alive = false;
  game.collected.push(m);
  game.captThisShot++;
  if (m.rarity >= 4) burst(m.x, m.y, ['#ff5ca8', '#ffd54f', '#ffffff', '#ffab40'], 72, true);
  else if (m.rarity >= 3) burst(m.x, m.y, ['#ffd54f', '#fff3c0', '#ffab40', '#ffffff'], 46, true);
  else if (m.rarity === 2) burst(m.x, m.y, [m.rcol, '#ffffff'], 18, false);
  if (sunk) game.sinks.push({ x: m.x, y: m.y, r: m.r, sprite: m.sprite, t: 0 });
  else game.fx.push({ x: m.x, y: m.y, r: m.r, sprite: m.sprite, t: 0 });
  game.floats.push({ x: m.x, y: m.y, t: 0,
    txt: m.rarity >= 1 ? `${m.tname} +${m.val}` : '+1',
    col: m.rarity >= 1 ? m.rcol : '#7ff0ff' });
}
// avcı: the enek captures any target it touches while moving
function avciContact() {
  const sh = game.shooter; if (!sh) return;
  for (const m of game.marbles) {
    if (m.type !== 'target' || !m.alive) continue;
    if (Math.hypot(m.x - sh.x, m.y - sh.y) < sh.r + m.r) { capture(m, false); sfx.pop(); }
  }
}
function resolveShot() {
  let bestRare = -1, bestName = '', pts = 0, bonusShots = 0, sunkAny = false;
  if (game.mode === 'cember') {
    for (const m of game.marbles) {
      if (m.type !== 'target') continue;
      if (distC(m) > CIRCLE.r + m.r) { pts += m.val; if (m.rarity >= 3) bonusShots++;
        if (m.rarity > bestRare) { bestRare = m.rarity; bestName = m.tname; } capture(m, false); }
    }
  } else if (game.mode === 'cukur') {
    for (const m of game.marbles) {
      if (m.type !== 'target') continue;
      if (Math.hypot(m.x - HOLE.x, m.y - HOLE.y) < HOLE.r) { pts += m.val; sunkAny = true;
        if (m.rarity >= 3) bonusShots++;
        if (m.rarity > bestRare) { bestRare = m.rarity; bestName = m.tname; } capture(m, true); }
    }
    // sinking your enek into the pot earns a bonus flick
    if (Math.hypot(game.shooter.x - HOLE.x, game.shooter.y - HOLE.y) < HOLE.r) bonusShots++;
  }
  // (avcı captures already happened on contact; tallied below)

  const captured = game.mode === 'avci' ? game.captThisShot : game.marbles.filter(m => !m.alive && m.type === 'target').length;
  game.marbles = game.marbles.filter(m => m.alive);

  if (game.mode === 'avci') {
    // recompute pts/rare from the marbles captured this shot (last captThisShot in collected)
    const shotMarbles = game.collected.slice(game.collected.length - game.captThisShot);
    for (const m of shotMarbles) { pts += m.val; if (m.rarity >= 3) bonusShots++;
      if (m.rarity > bestRare) { bestRare = m.rarity; bestName = m.tname; } }
  }

  const gained = pts * Math.max(1, game.captThisShot);   // multi-capture multiplies
  game.score += gained;
  if (game.captThisShot > 0) {
    if (sunkAny) sfx.sink(); else sfx.pop();
    if (game.captThisShot >= 2) {
      sfx.combo(game.captThisShot);
      game.floats.push({ x: CENTER.x, y: CENTER.y - 40, t: 0, txt: `COMBO x${game.captThisShot} = +${gained}`, col: '#ffd166' });
    }
    if (bestRare >= 2) sfx.rare();
  }
  if (bonusShots > 0) { game.shots += bonusShots;
    showCallout(`${bestRare >= 0 ? bestName + '! ' : ''}+${bonusShots} SHOT${bonusShots > 1 ? 'S' : ''}! ✨`);
  } else if (bestRare >= 2) showCallout(`${bestName}! ✨`);
  else if (game.captThisShot >= 3) showCallout(`MEGA x${game.captThisShot}!`);
  else if (game.captThisShot === 2) showCallout('Double!');

  // the enek returns to your thumb (unless it fell in the pot — then a fresh one)
  game.shooter.x = SPAWN.x; game.shooter.y = SPAWN.y;
  game.shooter.vx = game.shooter.vy = 0;

  const targetsLeft = game.marbles.filter(m => m.type === 'target').length;
  if (targetsLeft < (game.mode === 'avci' ? 4 : 6)) {
    if (placeTargets(game.mode === 'avci' ? 6 : 6) > 0 && game.shots > 0) showCallout('Fresh marbles!');
  }
  updateHUD();
  if (game.shots <= 0) { endRun(); return; }
  game.phase = 'aim';
}
function endRun() {
  game.phase = 'over'; game.runs++;
  const b = game.best[game.mode] || 0;
  const newBest = game.score > b;
  if (newBest) game.best[game.mode] = game.score;
  save(); sfx.over();
  if (newBest && game.score > 0) burst(CENTER.x, CENTER.y, ['#ffd166', '#fff', '#e65100'], 60, true);
  $('overTitle').textContent = `${MODES[game.mode].name} — run over!`;
  $('finalScore').textContent = game.score;
  const bl = $('bestLine');
  bl.textContent = newBest ? '🏆 NEW BEST!' : `Best: ${game.best[game.mode]}`;
  bl.classList.toggle('nb', newBest);
  const el = $('collected'); el.innerHTML = '';
  const list = game.collected.slice().sort((a, b) => b.rarity - a.rarity || b.val - a.val);
  for (const m of list) {

  $('overOv').classList.remove('hidden');

const cv = $('cv'), ctx = cv.getContext('2d');
const view = { s: 1, ox: 0, oy: 0, dpr: 1 };
function resize() {
  view.dpr = window.devicePixelRatio || 1;
  const cw = innerWidth, ch = innerHeight;
  cv.width = cw * view.dpr; cv.height = ch * view.dpr;
  view.s = Math.min(cw / W, ch / H);
  view.ox = (cw - W * view.s) / 2; view.oy = (ch - H * view.s) / 2;
}
addEventListener('resize', resize); addEventListener('orientationchange', resize); resize();
const toWorld = e => ({ x: (e.clientX - view.ox) / view.s, y: (e.clientY - view.oy) / view.s });
const drag = { on: false, x: 0, y: 0 };
const canAim = () => game.screen === 'play' && game.phase === 'aim';
cv.addEventListener('pointerdown', e => {
  audio();
  if (!canAim()) return;
  const p = toWorld(e), sh = game.shooter;
  if (Math.hypot(p.x - sh.x, p.y - sh.y) < Math.max(95, sh.r * 3.5)) {
    drag.on = true; drag.x = p.x; drag.y = p.y;
    cv.setPointerCapture(e.pointerId);
  }
});
cv.addEventListener('pointermove', e => { if (drag.on) { const p = toWorld(e); drag.x = p.x; drag.y = p.y; } });
cv.addEventListener('pointerup', () => {
  if (!drag.on) return;
  drag.on = false;
  if (!canAim()) return;
  const sh = game.shooter;
  const dx = sh.x - drag.x, dy = sh.y - drag.y, len = Math.hypot(dx, dy);
  if (len < 24) return;
  const pow = clamp(len / MAX_DRAG, 0, 1);
  const sp = MIN_SPEED + (MAX_SPEED - MIN_SPEED) * pow;
  fireShot(dx / len * sp, dy / len * sp);
});
cv.addEventListener('pointercancel', () => { drag.on = false; });
cv.addEventListener('contextmenu', e => e.preventDefault());

function dottedLine(x0, y0, ang, len) {
  const n = Math.max(3, (len / 21) | 0);
  for (let i = 1; i <= n; i++) {
    const d = i / n * len;
    ctx.beginPath();
    ctx.arc(x0 + Math.cos(ang) * d, y0 + Math.sin(ang) * d, 4.6 - i / n * 2.2, 0, 7);
    ctx.fillStyle = `rgba(255,255,255,${0.85 - i / n * 0.45})`; ctx.fill();
  }
  const hx = x0 + Math.cos(ang) * (len + 12), hy = y0 + Math.sin(ang) * (len + 12);
  ctx.save(); ctx.translate(hx, hy); ctx.rotate(ang);
  ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(-6, -7); ctx.lineTo(-6, 7); ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,.9)'; ctx.fill(); ctx.restore();
}

  ctx.fillStyle = '#4a3320'; ctx.fillRect(0, 0, cv.width, cv.height);
  const shx = game.shake ? rand(-game.shake, game.shake) : 0;
  const shy = game.shake ? rand(-game.shake, game.shake) : 0;
  ctx.setTransform(dpr * view.s, 0, 0, dpr * view.s, dpr * (view.ox + shx * view.s), dpr * (view.oy + shy * view.s));
  if (bg.width) ctx.drawImage(bg, 0, 0, W, H);

  // sinking marbles (çukur) — shrink into the pot
  for (const s of game.sinks) {
    const k = clamp(s.t / 0.45, 0, 1), r = s.r * (1 - k);
    ctx.globalAlpha = 1 - k * 0.4;
    ctx.drawImage(s.sprite, HOLE.x - r + (s.x - HOLE.x) * (1 - k), HOLE.y - r + (s.y - HOLE.y) * (1 - k), r * 2, r * 2);
    ctx.globalAlpha = 1;
  }

  for (const m of game.marbles) {
    ctx.beginPath(); ctx.ellipse(m.x + 3, m.y + 5, m.r * 1.02, m.r * 0.88, 0, 0, 7);
    ctx.fillStyle = 'rgba(48,28,10,.32)'; ctx.fill();
  }
  // rarity halos
  for (const m of game.marbles) {
    if (!(m.rarity >= 2)) continue;
    const pulse = 0.22 + Math.sin(t * 3 + m.rot) * 0.08;
    const g = ctx.createRadialGradient(m.x, m.y, m.r * .5, m.x, m.y, m.r * 2);
    g.addColorStop(0, mix(m.rcol, 'w', 0, pulse)); g.addColorStop(1, mix(m.rcol, 'w', 0, 0));
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(m.x, m.y, m.r * 2, 0, 7); ctx.fill();
  }
  // enek pulse ring
  if (game.screen === 'play' && game.phase === 'aim' && game.shooter) {
    const sh = game.shooter;
    ctx.beginPath(); ctx.arc(sh.x, sh.y, sh.r + 9 + Math.sin(t * 4) * 2.6, 0, 7);
    ctx.strokeStyle = 'rgba(255,225,130,.85)'; ctx.lineWidth = 3.5;
    ctx.setLineDash([7, 8]); ctx.stroke(); ctx.setLineDash([]);
  }
  // marbles
  for (const m of game.marbles) {
    ctx.save(); ctx.translate(m.x, m.y); ctx.rotate(m.rot);
    ctx.drawImage(m.sprite, -m.r, -m.r, m.r * 2, m.r * 2);
    ctx.restore();
    const g = ctx.createRadialGradient(m.x - m.r * .35, m.y - m.r * .42, 0, m.x - m.r * .35, m.y - m.r * .42, m.r * .5);
    g.addColorStop(0, 'rgba(255,255,255,.85)'); g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(m.x - m.r * .35, m.y - m.r * .42, m.r * .5, 0, 7); ctx.fill();
  }
  // aim
  if (drag.on && canAim()) {
    const sh = game.shooter;
    const dx = sh.x - drag.x, dy = sh.y - drag.y, len = Math.hypot(dx, dy);
    if (len < 24) {
      ctx.font = 'bold 30px sans-serif'; ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,90,80,.95)'; ctx.fillText('✕', sh.x, sh.y - sh.r - 16);
    } else {
      const pow = clamp(len / MAX_DRAG, 0, 1), ang = Math.atan2(dy, dx);
      dottedLine(sh.x, sh.y, ang, 60 + pow * 250);
      ctx.beginPath(); ctx.arc(sh.x, sh.y, sh.r + 11, -Math.PI / 2, -Math.PI / 2 + pow * Math.PI * 2);
      ctx.strokeStyle = `hsl(${115 - pow * 115},85%,55%)`; ctx.lineWidth = 6; ctx.stroke();
    }
  }
  // capture pops
  for (const f of game.fx) {
    const k = f.t / 0.5;
    ctx.globalAlpha = 1 - k;
    const r = f.r * (1 + k * 1.1);
    ctx.drawImage(f.sprite, f.x - r, f.y - r - k * 26, r * 2, r * 2);
    ctx.globalAlpha = 1;
  }
  // confetti
  for (const p of game.parts) {
    ctx.save(); ctx.globalAlpha = 1 - p.t / p.life;
    ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    ctx.fillStyle = p.col; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  }
  // floats
  ctx.textAlign = 'center';
  for (const f of game.floats) {
    const k = f.t / 1.1;
    ctx.globalAlpha = 1 - k;
    ctx.font = "bold 30px 'Segoe Print','Comic Sans MS',cursive";
    ctx.strokeStyle = 'rgba(40,20,5,.8)'; ctx.lineWidth = 5;
    ctx.strokeText(f.txt, f.x, f.y - k * 55);
    ctx.fillStyle = f.col; ctx.fillText(f.txt, f.x, f.y - k * 55);
    ctx.globalAlpha = 1;
  }
}

/* ============================== UI / HUB ============================== */
function updateHUD() {
  $('score').textContent = game.score;
  $('best').textContent = `Best: ${Math.max(game.best[game.mode] || 0, game.score)}`;
  const el = $('shots'); el.innerHTML = '';
  const total = Math.max(game.shots, START_SHOTS);
  for (let i = 0; i < Math.min(total, 16); i++) {
    const d = document.createElement('span');
    d.className = 'sh' + (i >= game.shots ? ' used' : '');
    el.appendChild(d);
  }
}
function showCallout(txt) {
  const el = $('callout');
  el.textContent = txt; el.classList.remove('pop');
  void el.offsetWidth; el.classList.add('pop');
}
// build the three mode cards, each with a little animated preview sprite
function buildHub() {
  const grid = $('modeGrid'); grid.innerHTML = '';
  const icons = { cember: ['kedigozu', '#e74c3c'], cukur: ['galaksi', '#283593'], avci: ['demirli', '#8f98a3'] };
  for (const key of ['cember', 'cukur', 'avci']) {
    const M = MODES[key];
    const d = document.createElement('div'); d.className = 'mode'; d.dataset.mode = key;
    const [kind, col] = icons[key];
    d.appendChild(makeSprite(20, kind, col));
    const nm = document.createElement('div'); nm.className = 'mn'; nm.textContent = M.name; d.appendChild(nm);
    const ds = document.createElement('div'); ds.className = 'md'; ds.textContent = M.blurb; d.appendChild(ds);
    const mb = document.createElement('div'); mb.className = 'mb'; mb.textContent = `Best: ${game.best[key] || 0}`; d.appendChild(mb);
    d.onclick = () => { audio(); startRun(key); };
    grid.appendChild(d);
  }
  $('hubFoot').textContent = `18 marble models · 5 rarities · ${game.runs} runs played`;
}
function goHub() {
  game.screen = 'hub'; game.phase = 'idle';
  $('overOv').classList.add('hidden'); $('hud').classList.remove('on');
  buildHub(); $('hub').classList.remove('hidden');
}
$('btnAgain').onclick = () => startRun(game.mode);
$('btnBack').onclick = goHub;
$('btnHome').onclick = goHub;
$('btnMute').onclick = () => { game.muted = !game.muted; $('btnMute').textContent = game.muted ? '🔇' : '🔊'; save(); };
$('btnMute').textContent = game.muted ? '🔇' : '🔊';

/* ============================== MAIN LOOP ============================== */
function update(dt) {
  game.time += dt;
  game.shake *= Math.pow(0.0005, dt);
  if (game.shake < 0.15) game.shake = 0;
  for (const f of game.fx) f.t += dt;
  for (const f of game.floats) f.t += dt;
  for (const s of game.sinks) s.t += dt;
  for (const p of game.parts) {
    p.t += dt; p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= (1 - 2.5 * dt); p.vy *= (1 - 2.5 * dt); p.rot += p.vr * dt;
  }
  game.fx = game.fx.filter(f => f.t < 0.5);
  game.floats = game.floats.filter(f => f.t < 1.1);
  game.sinks = game.sinks.filter(s => s.t < 0.45);
  game.parts = game.parts.filter(p => p.t < p.life);
  if (game.screen !== 'play' || game.phase !== 'moving') return;
  stepWorld(game.marbles, dt, true);
  if (allStopped(game.marbles)) {
    game.settleTimer += dt;
    if (game.settleTimer > 0.22) { game.settleTimer = 0; resolveShot(); }
  } else game.settleTimer = 0;
}
makeBackground('cember'); placeTargets(12);   // hub backdrop (harmless — hub overlay covers it)
buildHub();

let last = performance.now(), acc = 0;
function frame(now) {
  requestAnimationFrame(frame);
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.1) dt = 0.1;
  acc += dt; let n = 0;
  while (acc >= STEP && n++ < 10) { update(STEP); acc -= STEP; }
  render(now / 1000);
}
requestAnimationFrame(frame);
window.__arcade = { game, view, CENTER, CIRCLE, HOLE, SPAWN, MODES };
</script>
