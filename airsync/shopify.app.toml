# Shopify app configuration for AirSync.
# `shopify app config link` fills in client_id (and name/handle) the first
# time you run `shopify app dev`, and `shopify app deploy` pushes this
# config — including every webhook subscription below — to Shopify.

client_id = ""

[access_scopes]
# read_products / read_orders: needed to sync products and orders.
# read_all_orders: lets the initial sync reach back 90 days (without it,
# Shopify only exposes the last 60 days of orders). Works on development
# stores immediately; for a public App Store listing Shopify must approve
# this scope — see DEPLOY.md.
scopes = "read_orders,read_all_orders,read_products"

[webhooks]
api_version = "2025-01"

  # Order sync — handled by /app/routes/webhooks.orders.tsx
  [[webhooks.subscriptions]]
  topics = ["orders/create", "orders/updated", "orders/cancelled"]
  uri = "/webhooks/orders"

  # Product sync — handled by /app/routes/webhooks.products.tsx
  [[webhooks.subscriptions]]
  topics = ["products/create", "products/update", "products/delete"]
  uri = "/webhooks/products"

  # Uninstall cleanup — handled by /app/routes/webhooks.app.uninstalled.tsx
  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app/uninstalled"

  # Scope-change bookkeeping — handled by /app/routes/webhooks.app.scopes_update.tsx
  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

  # Mandatory GDPR/privacy webhooks — handled by /app/routes/webhooks.compliance.tsx
  [[webhooks.subscriptions]]
  compliance_topics = [
    "customers/data_request",
    "customers/redact",
    "shop/redact",
  ]
  uri = "/webhooks/compliance"
