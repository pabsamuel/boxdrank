name: Build Android APK

# Produces a downloadable, installable debug APK so the keyboard can be tried on
# a real phone without Android Studio. Download from the run's Artifacts section.
on:
  push:
    branches: [claude/global-emotes-implementation-x5fk9f, main]
    paths:
      - 'global-emotes/apps/android/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: global-emotes/apps/android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11'

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: global-emotes-apk
          path: global-emotes/apps/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Publish a clean, direct-download APK as a rolling GitHub Release so it
      # can be installed on a phone from the browser without unzipping an
      # Actions artifact. Only on main.
      - name: Publish APK to GitHub Release
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp global-emotes/apps/android/app/build/outputs/apk/debug/app-debug.apk global-emotes.apk
          gh release delete android-latest --yes --cleanup-tag || true
          gh release create android-latest global-emotes.apk \
            --title "Global Emotes keyboard — latest build" \
            --notes "Sideloadable debug APK. Install it, then enable the **Global Emotes** keyboard in Android Settings → System → Languages & input → On-screen keyboard."
