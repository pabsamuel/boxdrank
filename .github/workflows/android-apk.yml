name: Build Android APK

# Produces a downloadable, installable debug APK so the keyboard can be tried on
# a real phone without Android Studio. Download from the run's Artifacts section.
on:
  push:
    branches: [claude/global-emotes-implementation-x5fk9f, main]
    paths:
      - 'global-emotes/apps/android/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: global-emotes/apps/android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11'

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: global-emotes-apk
          path: global-emotes/apps/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
