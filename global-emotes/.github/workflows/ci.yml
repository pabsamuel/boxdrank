name: CI

on:
  push:
    branches: [main]
    paths: ['global-emotes/**']
  pull_request:
    paths: ['global-emotes/**']

defaults:
  run:
    working-directory: global-emotes

jobs:
  verify:
    name: Format · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: global-emotes/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm -r typecheck
      # DB/integration tests run on embedded PGlite — no services needed (ADR-0003).
      - run: pnpm -r test

  migration-drift:
    name: Migration drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: global-emotes/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Schema changes without a generated migration fail here.
      - run: pnpm db:generate && git diff --exit-code -- packages/database/drizzle

  keyboard-privacy:
    name: Keyboard privacy guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The keyboard must never read or capture typed text (master spec §4.3).
      # Fails if forbidden input-capture APIs appear in keyboard source trees.
      - name: Grep for forbidden APIs in keyboard code
        run: |
          set -e
          FORBIDDEN='getTextBeforeCursor|getTextAfterCursor|getSelectedText|documentContextBeforeInput|documentContextAfterInput'
          MATCHES=$(grep -rnE "$FORBIDDEN" \
            global-emotes/apps/android/app/src/main/java/app/globalemotes/keyboard \
            global-emotes/apps/ios/EmoteKeyboard || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Forbidden input-capture API in keyboard code:"; echo "$MATCHES"; exit 1
          fi
          echo "Keyboard privacy invariants hold."
        working-directory: .

  web-build:
    name: Web production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: global-emotes/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @global-emotes/web build

  security:
    name: Dependency & secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm audit --prod --audit-level high || echo "::warning::audit findings — review before release"
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android-build:
    name: Android debug build + unit tests
    runs-on: ubuntu-latest
    # Requires Android SDK; kept non-blocking until the wrapper is committed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: |
          cd global-emotes/apps/android
          gradle wrapper --gradle-version 8.11 -q
          ./gradlew :app:assembleDebug :app:testDebugUnitTest
        working-directory: .
